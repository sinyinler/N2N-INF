# ============================================================
# SINF (BSN→N2N) 复现 — 默认配置
# 论文: Hu et al. 2026, TPAMI,
#       "Learning Continuous Spatiotemporal Implicit Neural Fields
#        for Unsupervised Video Denoising"
# 本文件集中管理所有超参；锁定依据见 experiment_log.md §1。
# ============================================================

data:
  root_dir: ""                # LSCI 序列根目录 (.lbf / .npy)
  intensity_transform: log1p  # 已定：先 log1p；learned_vst 留作对比实验 E3
  temporal_length: 5          # T=5，输入窗 = {t-2,...,t+2}
  window_radius: 2            # 输入窗半径 K=2
  pair_intervals: [7, 9]      # N2N 标签间隔；已弃用 5（窗半径2 下无法满足去相关≥5）
  exclude_target_from_window: true  # ⚠️ N2N 正确性：标签帧绝不能在输入窗里
  npy_subdir: npy             # 每个子文件夹优先用 <子>/npy/；没有则退回子文件夹内直接的 lbf
  exclude_dirs: [bfi_nonoverlap]  # 这些名字的目录永不参与训练
  crop_size: 256              # 必须 256：512 会让 TSGM 窗口注意力张量~4倍而 OOM；且 256 与 eval tile_size 口径一致
  normalize_to_01: false      # 论文归一化[0,1]；我们走 log1p，暂不强制

model:
  in_channels: 1              # LSCI 单通道
  out_channels: 1
  backbone: lightweight       # 已定：先用现有 16-32-64-80；论文 32-64-128-128-128 为对比实验 E4
  fourier_bands: 10           # 坐标 Fourier 编码倍频带数（论文未写死）
  bidirectional: true         # 双向编码 Ff / Fb
  ite:                        # 隐式时间嵌入（照搬论文）
    layers: 3
    hidden: 64
  tsgm:                       # 时间感知空间图对齐
    window: 7                 # 7x7 空间窗
    temporal_radius: 2        # 对齐输入窗半径（论文写3，为自洽改2）
    heads: 4
  inf_head:                   # 最终 INF 解码头（照搬论文）
    layers: 4
    hidden: 128
    activation: relu

loss:
  type: charbonnier           # 已定默认；l2 为对比实验 E1
  charbonnier_eps: 1.0e-3
  use_rtv: false              # 已定：先不挂；细血管被磨平时作对比实验 E2
  # 不使用蒸馏项（论文真实噪声分支的 distillation，我们无 teacher）

train:
  optimizer: adam
  lr: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 1.0e-6
  grad_clip_norm: 5
  batch_size: 8               # 2×A5000(24GB)：crop256 总batch8(每卡4)≈10GB/卡，稳；有余量可调到12
                              # 注：batch16 会因 TSGM注意力显存+DataParallel把loss堆到GPU0 而 OOM
  device: cuda
  multi_gpu: true             # >1 卡时自动 DataParallel，batch_size 按卡均分
  epochs: 20                  # 数据量大(~26万张/epoch≈1.6万iter)，几个epoch通常已收敛；可用 --max_iters 控制
  num_workers: 8              # 数据多、读 lbf/npy+裁剪较重，多开 worker 喂数据
  save_every: 1               # 每多少 epoch 存一次带 epoch 编号的 checkpoint
  ckpt_every_iters: 2000      # 每多少 iter 覆盖存一次 sinf_last.pth（崩溃/掉线保险）
  vis_every: 200              # 每多少 iter 存一张训练可视化
  out_dir: results

eval:
  metrics: [psnr, ssim, pearson_r]
  full_frame_sliding: true    # 评估用全图滑窗推理
  roi_zoom: true              # 细小血管 ROI 局部放大（规范第4条）
  tile_size: 256              # 全图分块推理的块大小（与训练 crop 一致，保证坐标归一化口径一致）
  tile_overlap: 128           # 相邻块重叠像素（50%），配合 Hann 羽化消除接缝
